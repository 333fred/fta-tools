<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FTA Tools</title>
    <meta
      name="description"
      content="A simple landing page of useful links for FIRST Technical Advisors."
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <h1>FTA Tools</h1>
        <label class="search" for="tool-search">
          <span class="search__label">Search links</span>
          <input
            id="tool-search"
            type="search"
            placeholder="Search by name, maintainer, description, or keyword"
            autocomplete="off"
          />
        </label>

        <p class="hero__meta">
          <span id="tool-count">0 links</span>
        </p>
      </div>
    </header>

    <main class="layout">
      <section id="sections" aria-live="polite"></section>
      <p id="empty-state" class="empty-state" hidden>
        No tools matched your search. Try a different keyword or clear the
        filter.
      </p>
    </main>

    <footer class="site-footer">
      <a
        class="footer__link"
        href="https://github.com/333fred/fta-tools"
        target="_blank"
        rel="noreferrer noopener"
      >
        View site source
      </a>
      <span class="footer__dot" aria-hidden="true"></span>
      <a
        class="footer__link"
        href="https://github.com/333fred/fta-tools/issues/new?template=request-link.yml"
        target="_blank"
        rel="noreferrer noopener"
      >
        Request a link
      </a>
    </footer>
  </body>
</html>
