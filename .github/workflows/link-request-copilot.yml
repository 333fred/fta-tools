name: Delegate link request to Copilot

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  delegate-link-request:
    if: startsWith(github.event.issue.title, '[Link Request]:') || contains(join(github.event.issue.labels.*.name, ','), 'link-request')
    runs-on: ubuntu-latest

    steps:
      - name: Validate Copilot assignment secret
        env:
          COPILOT_ASSIGN_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
        run: |
          if [ -z "$COPILOT_ASSIGN_TOKEN" ]; then
            echo "::error title=Missing COPILOT_ASSIGN_TOKEN::Create a repository secret named COPILOT_ASSIGN_TOKEN with a user token that can assign Copilot to issues."
            exit 1
          fi

      - name: Assign issue to Copilot coding agent
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/assignees" \
            --input - <<EOF
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "${REPOSITORY}",
              "base_branch": "${DEFAULT_BRANCH}",
              "custom_instructions": "Use the issue form fields to add the requested link to script.js. Preserve the existing toolSections structure and formatting. Populate name, resourceUrl, optional sourceUrl, maintainer, description, and tags from the issue. Add the link to the requested section unless there is a clearly better existing section. Validate the static site changes before opening the PR.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF
